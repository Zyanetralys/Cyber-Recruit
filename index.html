<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>root@zyanetralys:~# global-threat-monitor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');
    
    :root {
      /* Matrix Hacker Green Palette */
      --bg: #000000; --term-bg: #000800; --surface: #001400; --border: #003300;
      --green-dim: #003300; --green: #00aa00; --green-bright: #00ff00; --green-glow: rgba(0,255,0,0.4);
      --alert-red: #ff3333; --alert-orange: #ff9900; --info-blue: #00ccff;
      --text: #00ff00; --muted: #006600; --dim: #002200;
      --font-mono: 'JetBrains Mono', 'Share Tech Mono', monospace;
      --font-term: 'Share Tech Mono', monospace;
      --glow: 0 0 8px var(--green-glow), 0 0 16px var(--green-glow);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: var(--green); color: #000; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
      font-size: 12px;
      line-height: 1.35;
      text-shadow: 0 0 2px rgba(0,255,0,0.3);
    }
    
    /* === MATRIX RAIN BACKGROUND === */
    #matrix-rain {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; opacity: 0.08;
    }
    
    /* === SCANLINES + CRT === */
    .scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
      background: repeating-linear-gradient(
        180deg,
        rgba(0,0,0,0.15) 0px,
        rgba(0,0,0,0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      animation: scan 10s linear infinite;
    }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100vh; } }
    
    .crt-vignette {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 2;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
    }
    
    .crt-flicker {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 3;
      animation: flicker 0.08s infinite;
      opacity: 0.02;
      background: radial-gradient(ellipse at center, rgba(0,255,0,0.03) 0%, transparent 70%);
    }
    @keyframes flicker { 0%,100% { opacity: 0.015; } 50% { opacity: 0.03; } }
    
    /* === HEADER === */
    header {
      background: linear-gradient(180deg, var(--term-bg), var(--surface));
      border-bottom: 1px solid var(--green);
      padding: 0.35rem 1rem;
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-term);
      position: relative; z-index: 10;
      box-shadow: var(--glow);
    }
    .prompt {
      display: flex; align-items: center; gap: 0.4rem;
      font-weight: 500;
    }
    .prompt .user { color: var(--green-bright); }
    .prompt .host { color: var(--info-blue); }
    .prompt .path { color: var(--green); }
    .prompt .cmd { color: var(--green-bright); font-weight: 600; }
    .cursor { 
      display: inline-block; width: 8px; height: 14px; 
      background: var(--green-bright); 
      animation: blink 1s step-end infinite; 
      vertical-align: middle;
      box-shadow: 0 0 6px var(--green-bright);
    }
    @keyframes blink { 50% { opacity: 0; } }
    
    .header-meta {
      display: flex; align-items: center; gap: 0.8rem;
      font-size: 0.7rem; color: var(--muted);
    }
    .header-meta .author {
      color: var(--green-bright);
      font-weight: 600;
      text-shadow: var(--glow);
    }
    .status-indicator {
      display: flex; align-items: center; gap: 0.3rem;
      padding: 0.15rem 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--alert-red);
      box-shadow: 0 0 5px var(--alert-red);
    }
    .status-dot.active { background: var(--green-bright); box-shadow: 0 0 5px var(--green-bright); }
    .status-dot.paused { background: var(--alert-orange); box-shadow: 0 0 5px var(--alert-orange); }
    
    /* === MAIN GRID === */
    main {
      display: grid;
      grid-template-columns: 2.1fr 1.9fr;
      gap: 0.5rem;
      padding: 0.5rem;
      height: 100%;
      overflow: hidden;
      position: relative; z-index: 5;
    }
    
    .panel {
      background: var(--term-bg);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 20px rgba(0,255,0,0.05);
    }
    .panel::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      opacity: 0.6;
    }
    
    .panel-header {
      padding: 0.35rem 0.6rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-term);
      font-size: 0.68rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--green-bright);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .panel-header::before { content: '┌─['; color: var(--border); margin-right: 0.2rem; }
    .panel-header::after { content: ']─┐'; color: var(--border); margin-left: 0.2rem; }
    
    .panel-header button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.1rem 0.35rem;
      cursor: pointer;
      font-size: 0.62rem;
      font-family: var(--font-term);
      transition: 0.15s;
      text-transform: uppercase;
    }
    .panel-header button:hover {
      background: var(--green);
      color: #000;
      border-color: var(--green-bright);
      box-shadow: 0 0 6px var(--green-glow);
    }
    
    /* === CHAT TERMINAL === */
    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem;
      font-family: var(--font-term);
      font-size: 0.78rem;
      background: rgba(0,8,0,0.3);
    }
    
    .sys-msg {
      color: var(--info-blue);
      padding: 0.15rem 0;
      font-style: italic;
      border-left: 2px dashed var(--border);
      padding-left: 0.4rem;
      margin: 0.3rem 0;
      opacity: 0.9;
    }
    
    .msg-group { margin: 0.4rem 0; }
    
    .msg { display: flex; gap: 0.4rem; padding: 0.15rem 0; animation: termIn 0.18s ease; }
    @keyframes termIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: translateX(0); } }
    
    .msg-prefix {
      color: var(--green-bright);
      font-weight: 500;
      white-space: nowrap;
      min-width: 135px;
      font-size: 0.75rem;
    }
    .msg-prefix .handle { color: var(--info-blue); font-weight: 600; }
    .msg-prefix .role { color: var(--muted); font-size: 0.7em; margin-left: 0.25rem; }
    .msg-prefix .time { color: var(--dim); font-size: 0.68em; margin-left: 0.4rem; }
    
    .msg-text {
      color: var(--text);
      flex: 1;
      word-break: break-word;
      text-shadow: none;
    }
    .msg.highlight .msg-text { color: var(--alert-orange); text-shadow: 0 0 4px rgba(255,153,0,0.4); }
    .msg.reply .msg-text {
      border-left: 2px solid var(--info-blue);
      padding-left: 0.4rem;
      margin-left: 0.2rem;
      color: var(--info-blue);
    }
    
    .kw {
      background: rgba(0,170,0,0.25);
      color: var(--green-bright);
      padding: 0 3px;
      border-radius: 2px;
      font-weight: 600;
      border: 1px solid var(--green);
    }
    .mention { color: var(--info-blue); font-weight: 600; cursor: pointer; }
    .mention:hover { text-decoration: underline; text-shadow: 0 0 4px var(--info-blue); }
    
    .typing {
      color: var(--green-bright);
      font-style: italic;
      padding: 0.15rem 0 0.15rem 135px;
      font-size: 0.75rem;
    }
    .typing span { animation: dots 1.3s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dots { 0%,20% { opacity: 0; } 50% { opacity: 1; } 80%,100% { opacity: 0; } }
    
    /* === GLOBAL THREAT MAP === */
    #threat-map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #000800 0%, #000 70%);
    }
    #threat-map {
      width: 100%; height: 100%;
      display: block;
    }
    .map-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: 
        radial-gradient(ellipse at 30% 40%, rgba(0,255,0,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(0,200,255,0.02) 0%, transparent 50%);
    }
    .map-grid {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(rgba(0,51,0,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,51,0,0.3) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      opacity: 0.4;
    }
    
    .attack-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--alert-red), transparent);
      transform-origin: left center;
      box-shadow: 0 0 8px var(--alert-red), 0 0 16px var(--alert-red);
      animation: pulseAttack 1.5s ease-in-out infinite;
      opacity: 0.85;
    }
    @keyframes pulseAttack { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    
    .attack-particle {
      position: absolute;
      width: 6px; height: 6px;
      background: var(--alert-red);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--alert-red), 0 0 16px var(--alert-red);
      animation: travel 2s linear forwards;
    }
    @keyframes travel { from { transform: translate(0,0) scale(1); opacity: 1; } to { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; } }
    
    .country-node {
      position: absolute;
      width: 10px; height: 10px;
      background: var(--green);
      border: 2px solid var(--green-bright);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 6px var(--green-glow);
    }
    .country-node:hover {
      background: var(--green-bright);
      box-shadow: 0 0 12px var(--green-glow), 0 0 24px var(--green-glow);
      transform: translate(-50%, -50%) scale(1.3);
    }
    .country-node.under-attack {
      background: var(--alert-red);
      border-color: var(--alert-orange);
      box-shadow: 0 0 8px var(--alert-red), 0 0 16px var(--alert-red);
      animation: underAttack 0.6s ease-in-out infinite;
    }
    @keyframes underAttack { 0%,100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.2); } }
    
    .country-label {
      position: absolute;
      font-size: 0.6rem;
      color: var(--muted);
      transform: translate(-50%, -140%);
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 0 3px #000;
    }
    
    .map-legend {
      position: absolute;
      bottom: 0.5rem; left: 0.5rem;
      background: rgba(0,20,0,0.85);
      border: 1px solid var(--border);
      padding: 0.4rem 0.6rem;
      font-size: 0.65rem;
      z-index: 20;
    }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; margin: 0.15rem 0; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-dot.node { background: var(--green); border: 2px solid var(--green-bright); }
    .legend-dot.attack { background: var(--alert-red); box-shadow: 0 0 4px var(--alert-red); }
    .legend-dot.detected { background: var(--green-bright); box-shadow: 0 0 4px var(--green-bright); }
    
    .map-stats {
      position: absolute;
      top: 0.5rem; right: 0.5rem;
      background: rgba(0,20,0,0.85);
      border: 1px solid var(--border);
      padding: 0.4rem 0.6rem;
      font-size: 0.65rem;
      z-index: 20;
      min-width: 140px;
    }
    .stat-row { display: flex; justify-content: space-between; margin: 0.1rem 0; }
    .stat-val { color: var(--green-bright); font-weight: 600; }
    
    /* === DASHBOARD TABS === */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      overflow-x: auto;
      font-family: var(--font-term);
      font-size: 0.63rem;
    }
    .tab-btn {
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: 0.15s;
      text-transform: uppercase;
    }
    .tab-btn:hover { color: var(--green-bright); }
    .tab-btn.active {
      color: var(--green-bright);
      border-bottom-color: var(--green-bright);
      text-shadow: 0 0 4px var(--green-glow);
    }
    .tab-content {
      display: none;
      padding: 0.45rem;
      overflow-y: auto;
      flex: 1;
      font-size: 0.73rem;
    }
    .tab-content.active { display: block; }
    
    /* === PROFILE CARDS === */
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.45rem;
      margin-bottom: 0.35rem;
      cursor: pointer;
      transition: 0.15s;
    }
    .profile-card:hover {
      border-color: var(--green);
      background: #001a00;
      box-shadow: 0 0 8px rgba(0,255,0,0.1);
    }
    .profile-card.bookmarked {
      border-left: 3px solid var(--green-bright);
      box-shadow: inset 4px 0 0 var(--green-bright);
    }
    
    .profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem; }
    .profile-handle { color: var(--info-blue); font-weight: 600; font-size: 0.82rem; }
    .profile-role { color: var(--muted); font-size: 0.68rem; }
    .profile-score { color: var(--green-bright); font-weight: 700; font-family: var(--font-term); }
    
    .profile-bar { height: 3px; background: var(--border); margin: 0.25rem 0; overflow: hidden; }
    .profile-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--green-bright));
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 6px var(--green-glow);
    }
    
    .profile-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.15rem 0.4rem;
      font-size: 0.63rem; color: var(--muted);
      margin: 0.25rem 0;
    }
    .profile-stats span strong { color: var(--text); }
    
    .profile-tags { display: flex; flex-wrap: wrap; gap: 0.15rem; margin: 0.25rem 0; }
    .tag {
      font-size: 0.58rem;
      background: var(--border);
      color: var(--muted);
      padding: 1px 4px;
      border: 1px solid var(--green-dim);
    }
    .tag.hot {
      background: rgba(0,170,0,0.3);
      color: var(--green-bright);
      border-color: var(--green);
      box-shadow: 0 0 4px rgba(0,255,0,0.2);
    }
    
    .profile-actions { display: flex; gap: 0.25rem; margin-top: 0.25rem; }
    .profile-actions button {
      background: var(--border);
      border: none;
      color: var(--muted);
      padding: 0.12rem 0.35rem;
      cursor: pointer;
      font-size: 0.58rem;
      font-family: var(--font-term);
    }
    .profile-actions button:hover {
      background: var(--green);
      color: #000;
      box-shadow: 0 0 4px var(--green-glow);
    }
    .profile-actions button.active {
      background: var(--green-bright);
      color: #000;
      font-weight: 600;
    }
    
    /* === KEYWORDS === */
    .kw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 0.25rem; }
    .kw-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.35rem;
      text-align: center;
      font-size: 0.68rem;
    }
    .kw-item:hover { border-color: var(--green); box-shadow: 0 0 6px rgba(0,255,0,0.15); }
    .kw-count { color: var(--green-bright); font-weight: 700; font-family: var(--font-term); display: block; margin-top: 2px; font-size: 0.82rem; }
    
    /* === ALERTS === */
    .alert-item {
      padding: 0.35rem 0;
      border-bottom: 1px dashed var(--border);
      font-size: 0.68rem;
      display: flex; gap: 0.35rem;
    }
    .alert-sev {
      font-weight: 700;
      padding: 0 4px;
      border-radius: 2px;
      font-size: 0.62rem;
    }
    .alert-sev.crit { background: var(--alert-red); color: #000; box-shadow: 0 0 4px var(--alert-red); }
    .alert-sev.high { background: var(--alert-orange); color: #000; }
    .alert-sev.med { background: var(--info-blue); color: #000; }
    .alert-time { color: var(--dim); margin-left: auto; font-size: 0.63rem; }
    
    /* === THREADS === */
    .thread-item {
      background: var(--surface);
      border-left: 2px solid var(--info-blue);
      padding: 0.35rem 0.45rem;
      margin-bottom: 0.25rem;
      font-size: 0.68rem;
    }
    .thread-kw { color: var(--green-bright); font-weight: 600; }
    .thread-meta { color: var(--muted); font-size: 0.63rem; margin-top: 0.15rem; }
    .thread-users { display: flex; gap: 0.15rem; margin-top: 0.15rem; }
    .thread-user { background: var(--border); padding: 0 3px; border-radius: 2px; font-size: 0.58rem; }
    
    /* === METRICS === */
    .metric-row { display: flex; justify-content: space-between; padding: 0.18rem 0; font-size: 0.68rem; border-bottom: 1px dashed var(--border); }
    .metric-val { color: var(--green-bright); font-weight: 600; }
    
    /* === CONTROLS === */
    .controls {
      padding: 0.35rem 1rem;
      background: var(--term-bg);
      border-top: 1px solid var(--green);
      display: flex;
      gap: 0.45rem;
      align-items: center;
      flex-wrap: wrap;
      font-family: var(--font-term);
      font-size: 0.68rem;
      position: relative; z-index: 10;
      box-shadow: 0 -2px 10px rgba(0,255,0,0.1);
    }
    button, input {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.2rem 0.45rem;
      cursor: pointer;
      font-family: var(--font-term);
      font-size: 0.68rem;
    }
    button:hover, input:focus {
      border-color: var(--green);
      outline: none;
      box-shadow: 0 0 6px var(--green-glow);
    }
    button.primary {
      background: var(--green);
      color: #000;
      font-weight: 600;
      border: none;
    }
    button.primary:hover {
      background: var(--green-bright);
      box-shadow: 0 0 10px var(--green-glow);
    }
    .slider-wrap { display: flex; align-items: center; gap: 0.25rem; color: var(--muted); }
    input[type="range"] { accent-color: var(--green-bright); width: 75px; }
    
    /* === FOOTER === */
    footer {
      background: var(--term-bg);
      border-top: 1px solid var(--border);
      padding: 0.25rem 1rem;
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-term);
      font-size: 0.68rem;
      color: var(--muted);
      position: relative; z-index: 10;
    }
    .footer-author {
      color: var(--green-bright);
      font-weight: 600;
      text-shadow: var(--glow);
    }
    .footer-author::before { content: 'auth: '; color: var(--dim); }
    
    /* === TOAST === */
    .toast-container {
      position: fixed; bottom: 45px; right: 12px;
      z-index: 1000; display: flex; flex-direction: column; gap: 3px;
    }
    .toast {
      background: var(--term-bg);
      border: 1px solid var(--green);
      border-left: 3px solid var(--green-bright);
      padding: 0.35rem 0.55rem;
      font-size: 0.68rem;
      font-family: var(--font-term);
      max-width: 270px;
      animation: slideIn 0.18s ease;
      box-shadow: 0 0 10px rgba(0,255,0,0.2);
    }
    .toast.alert { border-left-color: var(--alert-red); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
    
    /* === KEYBOARD HINTS === */
    .kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      padding: 0 3px;
      border-radius: 2px;
      font-size: 0.62rem;
      font-family: var(--font-term);
      margin: 0 1.5px;
      color: var(--green-bright);
    }
    
    /* === RESPONSIVE === */
    @media (max-width: 950px) {
      main { grid-template-columns: 1fr; }
      .monitor-panel { height: 52vh; }
    }
    
    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--term-bg); }
    ::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--green); }
    
    /* === PRINT === */
    @media print {
      body { background: #000; color: #0f0; height: auto; }
      #matrix-rain, .scanlines, .crt-vignette, .crt-flicker, .controls, footer, .toast-container { display: none; }
      .panel { border: 1px solid #004400; box-shadow: none; }
      .msg-text { color: #0f0; }
      .kw { background: #002200; color: #0f0; border-color: #006600; }
    }
  </style>
</head>
<body>
  <!-- === VISUAL FX === -->
  <canvas id="matrix-rain"></canvas>

<script>
// ================= CONFIG =================
const CFG = {
  keywords: [
    'pentest','exploit','oscp','c2','reverse','malware','payload','shellcode','privilege escalation','lateral movement',
    'kerberoasting','pass-the-hash','mimikatz','cobalt strike','metasploit','burp','nmap','sqlmap','john','hashcat',
    'siem','soc','blue team','detection engineering','yara','sigma','edr','xdr','waf','firewall','ids','ips',
    'sandbox','memory forensics','log analysis','threat hunting','ioc','ttp','mitre att&ck','kubernetes','terraform',
    'ansible','docker','aws','azure','gcp','iam','zero-trust','sase','casb','ai security','llm security',
    'prompt injection','supply chain','zero-day','ransomware','phishing','social engineering','osint','ddos','botnet'
  ],
  roles: ['Pentester','Red Team','SOC L1','SOC L2','SOC L3','Threat Hunter','Malware Analyst','Reverse Engineer','Cloud Sec Engineer','AppSec Dev','Security Architect','IR Lead','GRC Analyst','Forensics Specialist'],
  handles: ['NullPtr','CipherWolf','KernelPanic','PhantomRoot','ZeroTrust','DarkNode','ByteShift','NullByte','RootKitty','ShadowSys','HexViper','GhostPacket'],
  personas: {
    technical: { style:'direct', post:['deploying {kw} to staging, validating cert chain','pushed fix for {kw} detection, PR #447 ready','testing {kw} evasion, AV bypass: 94%','analyzing {kw} sample, beacon: 14.3s ±0.2s'], reply:['confirmed. same {kw} pattern in telemetry','correlating {kw} with MITRE T1059.001','updating sigma rules for {kw}'] },
    analytical: { style:'methodical', post:['preliminary {kw} analysis shows multi-stage flow','{kw} indicators suggest APT-style TTPs','anomaly detected in {kw} traffic patterns'], reply:['cross-referenced {kw} with last week IOCs','adding {kw} to threat intel correlation','escalating {kw} findings to IR team'] },
    operational: { style:'action', post:['red team executed {kw}. MTTD:17min MTTR:5min','playbook updated for {kw} containment','automated {kw} response with SOAR, FP:2%'], reply:['aligned with metrics, tuning {kw} thresholds','integrating {kw} indicators into EDR','adding {kw} to runbook v3.2'] },
    strategic: { style:'big-picture', post:['evaluating {kw} impact on zero-trust arch','budget review: {kw} tooling ROI complete','risk assessment: {kw} exposure MEDIUM-HIGH'], reply:['aligning {kw} initiatives with Q3 objectives','scheduling {kw} review with leadership','incorporating {kw} into security roadmap'] }
  },
  weights: { tech:0.35, collab:0.25, threat:0.25, consistency:0.15 },
  persistenceKey: 'zya_cyber_v6'
};

// ================= STATE =================
const State = {
  bots: [], messages: [], threads: [], alerts: [], attacks: [], metrics: { totalMsgs:0, kwHits:0, alerts:0, attacks:0, blocked:0 },
  running: false, interval: 750, filter: new Set(), scenario: 'default', showMap: false, sessionId: `zya-${String(Math.random()).slice(2,6)}`,
  countries: [
    { code:'US', name:'United States', x:28, y:38, threat:0 }, { code:'CN', name:'China', x:78, y:42, threat:0 },
    { code:'RU', name:'Russia', x:68, y:28, threat:0 }, { code:'IR', name:'Iran', x:62, y:48, threat:0 },
    { code:'KP', name:'North Korea', x:82, y:38, threat:0 }, { code:'BR', name:'Brazil', x:35, y:72, threat:0 },
    { code:'DE', name:'Germany', x:52, y:32, threat:0 }, { code:'GB', name:'UK', x:48, y:30, threat:0 },
    { code:'FR', name:'France', x:50, y:35, threat:0 }, { code:'IN', name:'India', x:72, y:52, threat:0 },
    { code:'JP', name:'Japan', x:88, y:38, threat:0 }, { code:'AU', name:'Australia', x:90, y:78, threat:0 },
    { code:'CA', name:'Canada', x:25, y:32, threat:0 }, { code:'ES', name:'Spain', x:47, y:42, threat:0 },
    { code:'IT', name:'Italy', x:54, y:38, threat:0 }, { code:'NL', name:'Netherlands', x:51, y:30, threat:0 },
    { code:'SE', name:'Sweden', x:54, y:24, threat:0 }, { code:'PL', name:'Poland', x:58, y:32, threat:0 },
    { code:'TR', name:'Turkey', x:60, y:42, threat:0 }, { code:'SA', name:'Saudi Arabia', x:64, y:52, threat:0 }
  ],
  attackTypes: ['DDoS','Brute Force','SQL Injection','XSS','Malware Drop','C2 Beacon','Data Exfil','Credential Stuffing','Phishing Campaign','Zero-Day Exploit']
};

// ================= MATRIX RAIN ===
const MatrixRain = {
  canvas: null, ctx: null, fontSize: 14, columns: 0, drops: [],
  init() {
    this.canvas = document.getElementById('matrix-rain');
    this.ctx = this.canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.animate();
  },
  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this.columns = Math.floor(this.canvas.width / this.fontSize);
    this.drops = Array(this.columns).fill(0).map(() => Math.random() * -100);
  },
  animate() {
    this.ctx.fillStyle = 'rgba(0,0,0,0.04)';
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    this.ctx.fillStyle = '#00ff00';
    this.ctx.font = `${this.fontSize}px monospace`;
    for(let i = 0; i < this.columns; i++) {
      const char = String.fromCharCode(0x30A0 + Math.random() * 96);
      const x = i * this.fontSize, y = this.drops[i] * this.fontSize;
      this.ctx.fillText(char, x, y);
      if(y > this.canvas.height && Math.random() > 0.98) this.drops[i] = 0;
      this.drops[i]++;
    }
    requestAnimationFrame(() => this.animate());
  }
};

// ================= BOT =================
class Bot {
  constructor(id, handle, role) {
    this.id = id; this.handle = handle; this.role = role;
    this.expertise = new Set(CFG.keywords.slice(Math.floor(Math.random()*6), Math.floor(Math.random()*9)+6));
    this.hits = {}; this.scores = { tech:0, collab:0, threat:0, consistency:0 };
    this.state = 'idle'; this.status = 'online'; this.bookmarked = false; this.priority = 'medium'; this.notes = '';
    this.personaType = ['technical','analytical','operational','strategic'][Math.floor(Math.random()*4)];
    this.persona = CFG.personas[this.personaType];
    this.lastActive = Date.now(); this.msgCount = 0; this.replyRate = 0.28 + Math.random()*0.25;
    this.messages = [];
  }
  addHit(kw) { this.hits[kw] = (this.hits[kw]||0)+1; this._calcScores(); }
  _calcScores() {
    const total = Object.values(this.hits).reduce((a,b)=>a+b,0);
    this.scores.tech = Math.min(100, this.expertise.size*9 + total*2.2);
    this.scores.collab = Math.min(100, this.messages.filter(m=>m.reply).length*14);
    this.scores.threat = Math.min(100, Object.keys(this.hits).filter(k=>['zero-day','c2','bypass','evasion','privilege escalation','malware','ransomware','ddos'].includes(k)).length*20);
    this.scores.consistency = Math.min(100, Math.min(25, this.msgCount)*4);
    this.total = Math.round(this.scores.tech*CFG.weights.tech + this.scores.collab*CFG.weights.collab + this.scores.threat*CFG.weights.threat + this.scores.consistency*CFG.weights.consistency);
  }
  getTier() { const t=this.total; if(t>=90) return 'Principal'; if(t>=75) return 'Senior'; if(t>=55) return 'Mid'; return 'Junior'; }
  getStatusClass() { const idle=Date.now()-this.lastActive; if(idle>30000) return 'away'; if(this.state==='typing') return 'busy'; return 'online'; }
}

// ================= ATTACK ENGINE =================
const AttackEngine = {
  init() { State.countries.forEach(c => c.threat = 0); },
  generate() {
    if(!State.running) return;
    const src = State.countries.filter(c => ['CN','RU','IR','KP'].includes(c.code))[Math.floor(Math.random()*4)];
    const tgt = State.countries.filter(c => !['CN','RU','IR','KP'].includes(c.code))[Math.floor(Math.random()*16)];
    const type = State.attackTypes[Math.floor(Math.random()*State.attackTypes.length)];
    const severity = Math.random()>0.7 ? 'crit' : Math.random()>0.4 ? 'high' : 'med';
    
    const attack = {
      id: Date.now()+Math.random(), src: src.code, tgt: tgt.code, type, severity,
      ts: Date.now(), detected: Math.random()>0.25, blocked: false, progress: 0
    };
    
    State.attacks.unshift(attack);
    State.metrics.attacks++;
    src.threat = Math.min(100, src.threat + 15);
    if(attack.detected) { State.metrics.blocked++; tgt.threat = Math.min(100, tgt.threat + 5); }
    
    // Auto-resolve
    setTimeout(() => {
      if(!attack.blocked && attack.detected) { attack.blocked = true; State.metrics.blocked++; }
      if(State.attacks.indexOf(attack) > -1) State.attacks.splice(State.attacks.indexOf(attack),1);
    }, 3000 + Math.random()*4000);
    
    if(State.attacks.length > 25) State.attacks.pop();
    MapViz.render();
  }
};

// ================= MAP VISUALIZATION =================
const MapViz = {
  canvas: null, ctx: null, width: 0, height: 0,
  init(container) {
    this.canvas = document.getElementById('threat-map');
    this.ctx = this.canvas.getContext('2d');
    this.resize(container);
    window.addEventListener('resize', () => this.resize(container));
    this.render();
    this.animate();
  },
  resize(container) {
    this.width = container.offsetWidth; this.height = container.offsetHeight;
    this.canvas.width = this.width; this.canvas.height = this.height;
  },
  render() {
    const ctx = this.ctx, w = this.width, h = this.height;
    ctx.clearRect(0,0,w,h);
    
    // Draw country nodes
    State.countries.forEach(c => {
      const x = (c.x/100)*w, y = (c.y/100)*h;
      // Glow
      if(c.threat > 30) {
        const glow = ctx.createRadialGradient(x,y,0, x,y,15);
        glow.addColorStop(0, c.threat>70 ? 'rgba(255,51,51,0.4)' : 'rgba(0,255,0,0.2)');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(x,y,15,0,Math.PI*2); ctx.fill();
      }
      // Node
      ctx.fillStyle = c.threat>50 ? '#ff3333' : '#00ff00';
      ctx.strokeStyle = c.threat>50 ? '#ff9900' : '#00ff00';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
      // Label
      ctx.fillStyle = '#006600'; ctx.font = '10px monospace';
      ctx.textAlign = 'center'; ctx.fillText(c.code, x, y-12);
    });
    
    // Draw attack lines
    State.attacks.forEach(a => {
      const src = State.countries.find(c=>c.code===a.src), tgt = State.countries.find(c=>c.code===a.tgt);
      if(!src || !tgt) return;
      const x1=(src.x/100)*w, y1=(src.y/100)*h, x2=(tgt.x/100)*w, y2=(tgt.y/100)*h;
      const angle = Math.atan2(y2-y1, x2-x1), len = Math.hypot(x2-x1, y2-y1);
      
      ctx.save(); ctx.translate(x1,y1); ctx.rotate(angle);
      // Line trail
      const grad = ctx.createLinearGradient(0,0,len,0);
      grad.addColorStop(0, 'transparent');
      grad.addColorStop(0.5, a.severity==='crit'?'#ff3333':a.severity==='high'?'#ff9900':'#00ccff');
      grad.addColorStop(1, 'transparent');
      ctx.strokeStyle = grad; ctx.lineWidth = 2; ctx.shadowBlur = 8;
      ctx.shadowColor = a.severity==='crit'?'#ff3333':a.severity==='high'?'#ff9900':'#00ccff';
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(len,0); ctx.stroke();
      ctx.restore();
      
      // Particle
      a.progress = (a.progress || 0) + 0.02;
      if(a.progress >= 1) a.progress = 0;
      const px = x1 + (x2-x1)*a.progress, py = y1 + (y2-y1)*a.progress;
      ctx.fillStyle = a.detected ? '#00ff00' : (a.severity==='crit'?'#ff3333':'#ff9900');
      ctx.shadowBlur = 12; ctx.shadowColor = ctx.fillStyle;
      ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    });
    
    // Update stats
    document.getElementById('map-active').textContent = State.attacks.length;
    document.getElementById('map-blocked').textContent = State.metrics.blocked;
    document.getElementById('map-src').textContent = new Set(State.attacks.map(a=>a.src)).size;
  },
  animate() { if(State.running || State.attacks.length) { this.render(); } requestAnimationFrame(() => this.animate()); }
};

// ================= ENGINE =================
const Engine = {
  init() { if(State.bots.length) return; CFG.handles.forEach((h,i)=>State.bots.push(new Bot(`B${i+1}`,h,CFG.roles[Math.floor(Math.random()*CFG.roles.length)]))); AttackEngine.init(); },
  start() { if(State.running) return; State.running=true; State._timer=setInterval(()=>this._cycle(),State.interval); document.getElementById('sys-status').textContent='INTERCEPTING'; document.getElementById('sys-dot').className='status-dot active'; document.getElementById('btn-toggle').textContent='⏹ pause'; UI.sysMsg('▶ monitoring active'); },
  stop() { if(!State.running) return; State.running=false; clearInterval(State._timer); document.getElementById('sys-status').textContent='PAUSED'; document.getElementById('sys-dot').className='status-dot paused'; document.getElementById('btn-toggle').textContent='▶ start'; UI.sysMsg('⏸ monitoring paused'); },
  _cycle() {
    // Chat message
    if(Math.random() < 0.7) {
      const bot = State.bots[Math.floor(Math.random()*State.bots.length)];
      const shouldReply = State.messages.length>3 && Math.random()<bot.replyRate;
      bot.state='typing'; UI.showTyping(bot);
      setTimeout(()=>{
        bot.state='idle'; bot.lastActive=Date.now(); bot.msgCount++;
        const msg = this._genMsg(bot, shouldReply);
        const entry = { id:Date.now()+Math.random(), bot, msg, ts:Date.now(), reply:!!msg.replyTarget };
        State.messages.push(entry); bot.messages.push(entry); State.metrics.totalMsgs++;
        this._updateThreads(bot,msg); UI.hideTyping(bot); UI.pushChat(entry); UI.scan(bot,msg); UI.updateCounters(); UI.renderAll();
        if(State.messages.length%10===0) Storage.save();
      }, 200+Math.random()*350);
    }
    // Attack simulation (every 2-4 cycles)
    if(Math.random() < 0.35) AttackEngine.generate();
  },
  _genMsg(bot, shouldReply) {
    let kw, text, replyTarget=null;
    if(shouldReply && State.messages.length>2) {
      const recent = State.messages.slice(-8).filter(m=>Date.now()-m.ts<25000);
      if(recent.length) { const prev=recent[Math.floor(Math.random()*recent.length)]; replyTarget=prev.bot.handle; kw=prev.msg.kw||this._pickKw(bot); text=this._tpl(bot.persona.reply[Math.floor(Math.random()*bot.persona.reply.length)], kw, bot.role, replyTarget); }
      else shouldReply=false;
    }
    if(!shouldReply) { kw=this._pickKw(bot); text=this._tpl(bot.persona.post[Math.floor(Math.random()*bot.persona.post.length)], kw, bot.role); }
    if(State.scenario!=='default') text = (['red_team':'[RED] ','incident':'[INCIDENT] ','ctf':'[CTF] ','compliance':'[AUDIT] '][State.scenario]||'') + text;
    return { text, replyTarget, kw, scenario:State.scenario };
  },
  _pickKw(bot) { return (Math.random()<0.6 && bot.expertise.size>0) ? [...bot.expertise][Math.floor(Math.random()*bot.expertise.size)] : CFG.keywords[Math.floor(Math.random()*CFG.keywords.length)]; },
  _tpl(tpl,kw,role,handle) { return tpl.replace(/{kw}/g,kw).replace(/{role}/g,role).replace(/{handle}/g,handle||''); },
  _updateThreads(bot,msg) {
    let thread = State.threads.find(t=>t.kw===msg.kw && t.active && Date.now()-t.lastMsg<30000);
    if(!thread) { thread={id:Date.now(),kw:msg.kw,participants:new Set([bot.handle]),msgs:1,lastMsg:Date.now(),active:true,severity:['zero-day','c2','malware','bypass','ddos'].includes(msg.kw)?'high':'normal'}; State.threads.unshift(thread); if(State.threads.length>8)State.threads.pop(); }
    else { thread.participants.add(bot.handle); thread.msgs++; thread.lastMsg=Date.now(); }
    State.threads.forEach(t=>{if(Date.now()-t.lastMsg>45000)t.active=false;}); State.threads=State.threads.filter(t=>t.active);
  }
};

// ================= UI =================
const UI = {
  chatLog: document.getElementById('chat-log'),
  pushChat(entry) {
    const {bot,msg,ts}=entry;
    const group=document.createElement('div'); group.className='msg-group';
    const time=State.showTimestamps?new Date(ts).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'';
    let text=msg.text.replace(/(@\w+)/g,'<span class="mention">$1</span>').replace(new RegExp(`(${CFG.keywords.join('|')})`,'gi'),'<span class="kw">$1</span>');
    const msgClass=`msg${msg.replyTarget?' reply':''}${msg.kw?' highlight':''}`;
    group.innerHTML=`<div class="${msgClass}"><div class="msg-prefix"><span class="handle">${bot.handle}</span>${bot.role?`<span class="role">${bot.role}</span>`:''}${time?`<span class="time">${time}</span>`:''}</div><div class="msg-text">${text}</div></div>`;
    this.chatLog.appendChild(group); this.chatLog.scrollTop=this.chatLog.scrollHeight;
    if(this.chatLog.children.length>120) { const c=Array.from(this.chatLog.children); for(let el of c) { if(!el.classList.contains('sys-msg')&&!el.classList.contains('typing')) { this.chatLog.removeChild(el); break; } } }
  },
  sysMsg(text) { const div=document.createElement('div'); div.className='sys-msg'; div.textContent=`[${new Date().toLocaleTimeString()}] ${text}`; this.chatLog.appendChild(div); this.chatLog.scrollTop=this.chatLog.scrollHeight; },
  showTyping(bot) { let el=document.getElementById(`ty-${bot.id}`); if(!el){el=document.createElement('div');el.id=`ty-${bot.id}`;el.className='typing';this.chatLog.appendChild(el);} el.innerHTML=`${bot.handle} typing<span>.</span><span>.</span><span>.</span>`; this.chatLog.scrollTop=this.chatLog.scrollHeight; },
  hideTyping(bot) { const el=document.getElementById(`ty-${bot.id}`); if(el) el.remove(); },
  scan(bot,msg) {
    if(!msg.kw) return;
    if(CFG.keywords.includes(msg.kw)) { bot.addHit(msg.kw); State.metrics.kwHits++; }
    const critical=['zero-day','c2','bypass','evasion','privilege escalation','malware','ransomware','supply chain','ddos'];
    if(critical.some(k=>msg.text.toLowerCase().includes(k))) { this.logAlert(bot,msg,critical.filter(k=>msg.text.toLowerCase().includes(k))[0]); App.toast(`⚠ ${bot.handle}: ${msg.kw} detected`, 'alert'); }
  },
  logAlert(bot,msg,kw) { const alert={id:Date.now(),bot:bot.handle,kw,text:msg.text.substring(0,75),ts:new Date(),severity:['zero-day','c2','ransomware','ddos'].includes(kw)?'crit':(['bypass','evasion','malware'].includes(kw)?'high':'med')}; State.alerts.unshift(alert); State.metrics.alerts++; if(State.alerts.length>50)State.alerts.pop(); },
  updateCounters() { document.getElementById('op-count').textContent=State.bots.length; document.getElementById('attack-count').textContent=State.metrics.attacks; },
  renderAll() { this.renderProfiles(); this.renderKeywords(); this.renderAlerts(); this.renderMetrics(); },
  renderProfiles() {
    const container=document.getElementById('tab-profiles'), sorted=[...State.bots].sort((a,b)=>b.total-a.total);
    container.innerHTML=sorted.map(b=>{const status=b.getStatusClass();return`<div class="profile-card ${b.bookmarked?'bookmarked':''}" onclick="App.selectBot('${b.id}')"><div class="profile-header"><div><span class="profile-handle">${b.handle}</span><span class="profile-role">${b.role}</span></div><span class="profile-score">${b.total}%</span></div><div class="profile-bar"><div class="profile-fill" style="width:${b.total}%"></div></div><div class="profile-stats"><span>Tech:<strong>${b.scores.tech|0}%</strong></span><span>Collab:<strong>${b.scores.collab|0}%</strong></span><span>Threat:<strong>${b.scores.threat|0}%</strong></span><span>Cons:<strong>${b.scores.consistency|0}%</strong></span></div><div class="profile-tags">${[...b.expertise].slice(0,6).map(e=>`<span class="tag ${b.hits[e]>=2?'hot':''}">${e}</span>`).join('')}</div><div class="profile-actions"><button class="${b.bookmarked?'active':''}" onclick="event.stopPropagation();App.toggleBookmark('${b.id}')">${b.bookmarked?'★ saved':'☆ save'}</button><button onclick="event.stopPropagation();App.setPriority('${b.id}','high')">🔴</button><button onclick="event.stopPropagation();App.setPriority('${b.id}','medium')">🟡</button><button onclick="event.stopPropagation();App.setPriority('${b.id}','low')">🟢</button></div></div>`;}).join('');
  },
  renderKeywords() {
    const container=document.getElementById('tab-keywords'), counts={}; CFG.keywords.forEach(k=>counts[k]=0); State.bots.forEach(b=>Object.entries(b.hits).forEach(([k,v])=>counts[k]+=v));
    const sorted=Object.entries(counts).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,24);
    container.innerHTML=`<div class="kw-grid">${sorted.map(([k,v])=>`<div class="kw-item">${k}<span class="kw-count">${v}</span></div>`).join('')}</div>`;
  },
  renderAlerts() {
    const container=document.getElementById('tab-alerts');
    if(!State.alerts.length) { container.innerHTML='<div style="color:var(--dim);text-align:center;padding:1rem">[ no alerts ]</div>'; return; }
    container.innerHTML=State.alerts.slice(0,30).map(a=>`<div class="alert-item"><span class="alert-sev ${a.severity}">${a.severity.toUpperCase()}</span><div><strong>${a.bot}</strong> | ${a.kw}<br><span style="color:var(--dim)">${a.text}...</span></div><span class="alert-time">${a.ts.toLocaleTimeString()}</span></div>`).join('');
  },
  renderMetrics() {
    const container=document.getElementById('tab-metrics'), topBots=[...State.bots].sort((a,b)=>b.total-a.total).slice(0,5), topKws=Object.entries(State.bots.reduce((acc,b)=>{Object.entries(b.hits).forEach(([k,v])=>acc[k]=(acc[k]||0)+v);return acc;},{})).sort((a,b)=>b[1]-a[1]).slice(0,5);
    container.innerHTML=`<div style="margin-bottom:0.7rem"><div style="color:var(--green-bright);margin-bottom:0.25rem">SESSION METRICS</div><div class="metric-row"><span>Total Messages</span><span class="metric-val">${State.metrics.totalMsgs}</span></div><div class="metric-row"><span>Keyword Hits</span><span class="metric-val">${State.metrics.kwHits}</span></div><div class="metric-row"><span>Alerts</span><span class="metric-val">${State.metrics.alerts}</span></div><div class="metric-row"><span>Attacks Simulated</span><span class="metric-val">${State.metrics.attacks}</span></div><div class="metric-row"><span>Blocked</span><span class="metric-val">${State.metrics.blocked}</span></div><div class="metric-row"><span>Session ID</span><span class="metric-val">${State.sessionId}</span></div></div><div style="margin-bottom:0.7rem"><div style="color:var(--green-bright);margin-bottom:0.25rem">TOP PERFORMERS</div>${topBots.map(b=>`<div class="metric-row"><span>${b.handle}</span><span class="metric-val">${b.total}%</span></div>`).join('')}</div><div><div style="color:var(--green-bright);margin-bottom:0.25rem">TRENDING KEYWORDS</div>${topKws.map(([k,v])=>`<div class="metric-row"><span>${k}</span><span class="metric-val">${v}</span></div>`).join('')}</div>`;
  },
  toast(msg,type='info') { const c=document.getElementById('toast-container'), t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg; c.appendChild(t); setTimeout(()=>t.remove(),3000); }
};

// ================= STORAGE =================
const Storage = {
  save() { try { const data={sessionId:State.sessionId,bots:State.bots.map(b=>({id:b.id,handle:b.handle,role:b.role,expertise:[...b.expertise],hits:b.hits,scores:b.scores,total:b.total,bookmarked:b.bookmarked,priority:b.priority,notes:b.notes})),metrics:State.metrics,alerts:State.alerts.slice(0,20),ts:Date.now()}; localStorage.setItem(CFG.persistenceKey,JSON.stringify(data)); } catch(e){} },
  load() { const raw=localStorage.getItem(CFG.persistenceKey); if(!raw) return false; try { const data=JSON.parse(raw); if(data.bots) { data.bots.forEach(b=>{const bot=new Bot(b.id,b.handle,b.role);Object.assign(bot,b);bot.expertise=new Set(b.expertise);State.bots.push(bot);}); } if(data.metrics) Object.assign(State.metrics,data.metrics); if(data.alerts) State.alerts=data.alerts; if(data.sessionId) State.sessionId=data.sessionId; document.getElementById('session-id').textContent=State.sessionId; return true; } catch(e){ return false; } }
};

// ================= APP =================
const App = {
  init() { MatrixRain.init(); if(!Storage.load()) Engine.init(); UI.updateCounters(); UI.renderAll(); this._bindKeys(); UI.sysMsg(`session initialized: ${State.sessionId}`); if(State.showMap) MapViz.init(document.getElementById('threat-map-container')); },
  toggle() { State.running?Engine.stop():Engine.start(); },
  setSpeed(v) { State.interval=parseInt(v); document.getElementById('speed-val').textContent=(v/1000).toFixed(1)+'s'; if(State.running){Engine.stop();Engine.start();} },
  setFilter(val) { State.filter=new Set(val.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean)); },
  tab(name) { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); event.target.classList.add('active'); document.getElementById(`tab-${name}`).classList.add('active'); },
  selectBot(id) { const bot=State.bots.find(b=>b.id===id); if(bot) UI.toast(`selected: ${bot.handle} | score: ${bot.total}%`); },
  toggleBookmark(id) { const bot=State.bots.find(b=>b.id===id); if(bot) { bot.bookmarked=!bot.bookmarked; UI.renderProfiles(); Storage.save(); UI.toast(bot.bookmarked?`★ ${bot.handle} saved`:`${bot.handle} unmarked`); } },
  setPriority(id,p) { const bot=State.bots.find(b=>b.id===id); if(bot) { bot.priority=p; Storage.save(); UI.toast(`${bot.handle} priority: ${p}`); } },
  clearChat() { const log=document.getElementById('chat-log'), sys=Array.from(log.querySelectorAll('.sys-msg')); log.innerHTML=''; sys.forEach(s=>log.appendChild(s)); UI.sysMsg('chat cleared'); },
  toggleMap() { State.showMap=!State.showMap; const chat=document.getElementById('chat-log'), map=document.getElementById('threat-map-container'); if(State.showMap) { chat.style.display='none'; map.style.display='block'; MapViz.init(map); UI.sysMsg('🌍 threat map enabled'); } else { chat.style.display='block'; map.style.display='none'; UI.sysMsg('🌍 threat map disabled'); } },
  exportJSON() { const data={session:{id:State.sessionId,ts:new Date().toISOString(),scenario:State.scenario},author:'Zyanetralys',metrics:State.metrics,bots:State.bots.map(b=>({handle:b.handle,role:b.role,tier:b.getTier(),scores:b.scores,total:b.total,priority:b.priority,bookmarked:b.bookmarked,expertise:[...b.expertise],hits:b.hits})),alerts:State.alerts.slice(0,50),attacks:State.attacks.slice(0,30)}; this._download(JSON.stringify(data,null,2),`zya_cyber_report_${State.sessionId}.json`,'application/json'); UI.toast('exported: JSON'); },
  exportCSV() { const rows=[['Handle','Role','Tier','Total','Tech','Collab','Threat','Cons','Priority','Keywords']]; State.bots.sort((a,b)=>b.total-a.total).forEach(b=>{rows.push([b.handle,b.role,b.getTier(),b.total,b.scores.tech,b.scores.collab,b.scores.threat,b.scores.consistency,b.priority,[...b.expertise].join(';')])}); this._download(rows.map(r=>r.join(',')).join('\n'),`zya_roster_${State.sessionId}.csv`,'text/csv'); UI.toast('exported: CSV'); },
  _download(content,filename,type) { const blob=new Blob([content],{type}),a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href); },
  toast(msg,type) { UI.toast(msg,type); },
  _bindKeys() { document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return; switch(e.key.toLowerCase()) { case's':if(!e.ctrlKey&&!e.metaKey){e.preventDefault();this.toggle();}break; case'p':if(!e.ctrlKey&&!e.metaKey){e.preventDefault();this.toggle();}break; case'm':if(!e.ctrlKey&&!e.metaKey){e.preventDefault();this.toggleMap();}break; case'e':if(!e.ctrlKey&&!e.metaKey){e.preventDefault();this.exportJSON();}break; case'?':UI.toast('shortcuts: [S]tart/[P]ause [M]ap [E]xport [C]lear');break; case'c':if(e.ctrlKey){e.preventDefault();this.clearChat();}break; }}); }
};

// ================= INIT =================
window.onload = () => { if(!State.sessionId.startsWith('zya-')) { State.sessionId=`zya-${String(Math.random()).slice(2,6)}`; document.getElementById('session-id').textContent=State.sessionId; } App.init(); };
</script>
</body>
</html>
